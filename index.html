<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Belajar Bahasa Jepang</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0f0f1a;
                --surface: #1a1a2e;
                --surface2: #16213e;
                --primary: #e63946;
                --accent: #f0c27f;
                --success: #22c55e;
                --danger: #ef4444;
                --text: #f1f1f6;
                --text-muted: #9ca3af;
                --border: #2a2a4a;
                --radius: 16px;
                --radius-sm: 10px;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                min-height: 100dvh;
            }
            .page {
                display: none !important;
            }
            .page.active {
                display: flex !important;
                flex-direction: column;
                min-height: 100vh;
            }

            #homePage {
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 40px 24px;
                background: radial-gradient(
                    ellipse at 50% 0%,
                    #1a1a3e 0%,
                    #0f0f1a 60%
                );
            }
            .hero-icon {
                font-size: 64px;
                margin-bottom: 8px;
                animation: float 3s ease-in-out infinite;
            }
            @keyframes float {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-10px);
                }
            }
            .hero-title {
                font-size: 36px;
                font-weight: 800;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--primary)
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 8px;
            }
            .hero-sub {
                font-size: 15px;
                color: var(--text-muted);
                margin-bottom: 36px;
                max-width: 320px;
            }
            .home-buttons {
                display: flex;
                flex-direction: column;
                gap: 14px;
                width: 100%;
                max-width: 320px;
            }
            .btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                padding: 16px 28px;
                border: none;
                border-radius: var(--radius);
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition:
                    transform 0.15s,
                    box-shadow 0.2s;
                color: #fff;
            }
            .btn:active {
                transform: scale(0.97);
            }
            .btn-primary {
                background: linear-gradient(135deg, var(--primary), #d62828);
                box-shadow: 0 4px 20px rgba(230, 57, 70, 0.35);
            }
            .btn-primary:hover {
                box-shadow: 0 6px 28px rgba(230, 57, 70, 0.5);
            }
            .btn-secondary {
                background: var(--surface2);
                border: 1px solid var(--border);
            }
            .btn-secondary:hover {
                background: #1a2a4e;
            }
            .badge {
                background: var(--primary);
                color: #fff;
                font-size: 11px;
                font-weight: 700;
                min-width: 22px;
                height: 22px;
                border-radius: 11px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 0 6px;
                margin-left: auto;
            }
            .hero-footer {
                margin-top: 48px;
                font-size: 12px;
                color: var(--text-muted);
            }

            .page-header {
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                padding: 14px 20px;
                display: flex;
                align-items: center;
                gap: 14px;
                flex-shrink: 0;
            }
            .btn-back {
                background: transparent;
                border: 1px solid var(--border);
                color: var(--text);
                width: 36px;
                height: 36px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s;
                flex-shrink: 0;
            }
            .btn-back:hover {
                background: var(--border);
            }
            .page-header h2 {
                font-size: 17px;
                font-weight: 600;
            }

            #practicePage {
                background: var(--bg);
            }
            .practice-body {
                flex: 1;
                padding: 24px 20px;
                display: flex;
                flex-direction: column;
                gap: 20px;
                max-width: 600px;
                width: 100%;
                margin: 0 auto;
            }
            .question-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 32px 24px;
                text-align: center;
                animation: fadeUp 0.35s ease-out;
            }
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(16px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .question-label {
                font-size: 13px;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 1px;
                margin-bottom: 14px;
            }
            .question-text {
                font-size: 22px;
                font-weight: 600;
                line-height: 1.5;
            }
            .answer-area {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .answer-area input {
                width: 100%;
                padding: 16px 20px;
                border-radius: var(--radius-sm);
                border: 2px solid var(--border);
                background: var(--surface);
                color: var(--text);
                font-size: 18px;
                outline: none;
                transition: border-color 0.2s;
            }
            .answer-area input:focus {
                border-color: var(--accent);
            }
            .answer-area input::placeholder {
                color: var(--text-muted);
                font-size: 15px;
            }
            .answer-area input:disabled {
                opacity: 0.5;
            }
            .answer-area .btn-send {
                padding: 14px;
                border: none;
                border-radius: var(--radius-sm);
                background: var(--primary);
                color: #fff;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.15s;
            }
            .answer-area .btn-send:hover {
                background: #c1121f;
            }
            .answer-area .btn-send:disabled {
                background: var(--border);
                cursor: not-allowed;
            }
            .feedback {
                border-radius: var(--radius);
                padding: 20px 24px;
                animation: fadeUp 0.3s ease-out;
                text-align: center;
            }
            .feedback.correct {
                background: rgba(34, 197, 94, 0.12);
                border: 1px solid rgba(34, 197, 94, 0.3);
            }
            .feedback.wrong {
                background: rgba(239, 68, 68, 0.12);
                border: 1px solid rgba(239, 68, 68, 0.3);
            }
            .feedback .icon {
                font-size: 36px;
                margin-bottom: 8px;
            }
            .feedback .title {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 6px;
            }
            .feedback.correct .title {
                color: var(--success);
            }
            .feedback.wrong .title {
                color: var(--danger);
            }
            .feedback .detail {
                font-size: 14px;
                line-height: 1.6;
                color: var(--text-muted);
            }
            .feedback .detail strong {
                color: var(--text);
            }
            .btn-next {
                margin-top: 14px;
                padding: 12px 32px;
                border: none;
                border-radius: var(--radius-sm);
                background: var(--success);
                color: #fff;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
            }
            .btn-next:hover {
                background: #16a34a;
            }
            .loading-box {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 40px;
                color: var(--text-muted);
                font-size: 15px;
            }
            .loading-box .spinner {
                width: 20px;
                height: 20px;
                border: 3px solid var(--border);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            #vocabPage {
                background: var(--bg);
            }
            .vocab-body {
                flex: 1;
                padding: 20px;
                max-width: 600px;
                width: 100%;
                margin: 0 auto;
            }
            .vocab-empty {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 60px 20px;
                text-align: center;
                color: var(--text-muted);
                gap: 12px;
            }
            .vocab-empty .icon {
                font-size: 48px;
            }
            .vocab-empty h3 {
                font-size: 18px;
                color: var(--text);
            }
            .vocab-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .vocab-item {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 18px 20px;
                animation: fadeUp 0.25s ease-out;
            }
            .vocab-item .indonesian {
                font-size: 15px;
                color: var(--text-muted);
                margin-bottom: 8px;
            }
            .vocab-item .correct {
                font-size: 17px;
                font-weight: 600;
                color: var(--success);
                margin-bottom: 4px;
            }
            .vocab-item .romaji {
                font-size: 14px;
                color: var(--accent);
                margin-bottom: 6px;
                font-style: italic;
            }
            .vocab-item .wrong {
                font-size: 14px;
                color: var(--danger);
                margin-bottom: 8px;
            }
            .vocab-item .wrong span {
                text-decoration: line-through;
            }
            .vocab-item .meta {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 12px;
                color: var(--text-muted);
            }
            .vocab-item .btn-delete {
                background: transparent;
                border: 1px solid var(--border);
                color: var(--danger);
                padding: 4px 12px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 12px;
            }
            .vocab-item .btn-delete:hover {
                background: rgba(239, 68, 68, 0.1);
            }
            .vocab-footer {
                padding: 16px 0;
                display: flex;
                justify-content: center;
            }
            .btn-clear-all {
                padding: 10px 24px;
                border: 1px solid rgba(239, 68, 68, 0.3);
                border-radius: var(--radius-sm);
                background: transparent;
                color: var(--danger);
                font-size: 14px;
                cursor: pointer;
            }
            .btn-clear-all:hover {
                background: rgba(239, 68, 68, 0.1);
            }

            /* Mensetsu Renshuu */
            .btn-mensetsu {
                border: 2px solid var(--accent) !important;
                background: transparent !important;
                color: var(--accent) !important;
                font-weight: 700 !important;
            }
            .btn-mensetsu:hover {
                background: rgba(240, 194, 127, 0.1) !important;
            }
            .mensetsu-sub {
                display: none;
                flex-direction: column;
                gap: 8px;
                padding: 4px 0;
            }
            .mensetsu-sub.show {
                display: flex;
            }
            .mensetsu-sub-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 14px 24px;
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                background: var(--surface2);
                color: var(--text);
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s;
            }
            .mensetsu-sub-btn:hover {
                background: #1a2a4e;
                border-color: var(--accent);
            }

            /* Mensetsu Page */
            #mensetsuPage {
                background: var(--bg);
            }
            .mensetsu-body {
                flex: 1;
                padding: 20px;
                max-width: 600px;
                width: 100%;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            .mensetsu-step {
                font-size: 13px;
                color: var(--accent);
                text-transform: uppercase;
                letter-spacing: 1px;
                font-weight: 700;
            }
            .mensetsu-prompt {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 24px 20px;
                font-size: 16px;
                line-height: 1.6;
                color: var(--text);
                text-align: center;
            }
            .mensetsu-input-area {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .mensetsu-input-area textarea {
                width: 100%;
                min-height: 120px;
                max-height: 400px;
                padding: 16px 20px;
                border-radius: var(--radius-sm);
                border: 2px solid var(--border);
                background: var(--surface);
                color: var(--text);
                font-size: 16px;
                line-height: 1.6;
                outline: none;
                resize: vertical;
                font-family: inherit;
                transition: border-color 0.2s;
            }
            .mensetsu-input-area textarea:focus {
                border-color: var(--accent);
            }
            .mensetsu-input-area textarea::placeholder {
                color: var(--text-muted);
                font-size: 14px;
            }
            .mensetsu-send-btn {
                padding: 16px 24px;
                border: none;
                border-radius: 14px;
                background: linear-gradient(135deg, var(--accent), #e6a84d);
                color: #1a1a2e;
                font-size: 16px;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.25s ease;
                box-shadow: 0 4px 16px rgba(240, 194, 127, 0.3);
                letter-spacing: 0.3px;
                text-transform: uppercase;
            }
            .mensetsu-send-btn:hover {
                transform: translateY(-2px) scale(1.01);
                box-shadow: 0 6px 24px rgba(240, 194, 127, 0.45);
            }
            .mensetsu-send-btn:active {
                transform: translateY(0) scale(0.98);
            }
            .mensetsu-send-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none !important;
                box-shadow: none !important;
            }
            .mensetsu-result {
                border-radius: var(--radius);
                padding: 20px 24px;
                animation: fadeUp 0.3s ease-out;
                text-align: left;
                background: rgba(34, 197, 94, 0.08);
                border: 1px solid rgba(34, 197, 94, 0.2);
            }
            .mensetsu-result .similarity,
            .mensetsu-result .similarity-label {
                text-align: center;
            }
            .mensetsu-result .missing-title {
                text-align: center;
            }
            .mensetsu-result .similarity {
                font-size: 42px;
                font-weight: 800;
                color: var(--success);
                margin-bottom: 4px;
            }
            .mensetsu-result .similarity-label {
                font-size: 14px;
                color: var(--text-muted);
                margin-bottom: 12px;
            }
            .mensetsu-result .missing-title {
                font-size: 14px;
                font-weight: 600;
                color: var(--danger);
                margin: 14px 0 6px;
            }
            .mensetsu-result .missing-text {
                font-size: 14px;
                color: var(--text-muted);
                line-height: 1.6;
                background: rgba(239, 68, 68, 0.08);
                border-radius: 8px;
                padding: 12px 16px;
            }
            .mensetsu-result .feedback-text {
                font-size: 15px;
                color: var(--text);
                margin: 14px 0 0;
                padding: 12px 16px;
                background: rgba(240, 194, 127, 0.08);
                border-radius: 8px;
                line-height: 1.5;
            }
            .mensetsu-line-results {
                display: flex;
                flex-direction: column;
                gap: 8px;
                margin: 16px 0 8px;
                text-align: left;
            }
            .mensetsu-line-item {
                border-radius: 8px;
                padding: 12px 14px;
                border: 1px solid;
            }
            .mensetsu-line-item.ok {
                background: rgba(34, 197, 94, 0.06);
                border-color: rgba(34, 197, 94, 0.2);
            }
            .mensetsu-line-item.ng {
                background: rgba(239, 68, 68, 0.06);
                border-color: rgba(239, 68, 68, 0.2);
            }
            .line-header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 4px;
            }
            .line-icon {
                font-size: 16px;
            }
            .line-sim {
                font-size: 13px;
                font-weight: 700;
                color: var(--text);
                min-width: 36px;
            }
            .line-label {
                font-size: 13px;
                color: var(--text-muted);
                font-weight: 600;
            }
            .line-missing {
                font-size: 13px;
                color: var(--danger);
                margin: 4px 0 2px;
                line-height: 1.5;
            }
            .line-missing strong {
                color: var(--text);
                font-weight: 600;
            }
            .line-ref {
                font-size: 13px;
                color: var(--text-muted);
                line-height: 1.5;
            }
            .line-ref em {
                color: var(--accent);
                font-style: italic;
            }
            .ai-corrections {
                margin-top: 16px;
                padding: 14px 16px;
                border-radius: 8px;
                background: rgba(147, 51, 234, 0.06);
                border: 1px solid rgba(147, 51, 234, 0.2);
            }
            .ai-checking {
                font-size: 14px;
                color: var(--text-muted);
                text-align: center;
            }
            .ai-checking.done {
                color: var(--success);
            }
            .ai-title {
                font-size: 14px;
                font-weight: 700;
                color: rgba(147, 51, 234, 1);
                margin-bottom: 8px;
            }
            .ai-correction {
                font-size: 14px;
                padding: 6px 10px;
                margin: 4px 0;
                background: rgba(147, 51, 234, 0.04);
                border-radius: 6px;
                line-height: 1.5;
            }
            .ai-wrong {
                color: var(--danger);
                text-decoration: line-through;
            }
            .ai-right {
                color: var(--success);
                font-weight: 600;
            }
            .mensetsu-actions {
                display: flex;
                gap: 10px;
                justify-content: center;
            }
            .mensetsu-actions .btn-next {
                flex: 1;
                max-width: 220px;
            }
            .syst-result-header {
                font-size: 15px;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 14px;
                padding-bottom: 8px;
            }
            .btn-original {
                background: transparent;
                border: 1px solid var(--border);
                color: var(--text-muted);
                width: 36px;
                height: 36px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 15px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
                margin-left: auto;
                flex-shrink: 0;
            }
            .btn-original:hover {
                background: var(--border);
                color: var(--accent);
            }
            .mensetsu-original-text {
                display: none;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                padding: 16px 20px;
                font-size: 14px;
                line-height: 1.8;
                color: var(--text-muted);
                white-space: pre-wrap;
                word-break: break-word;
                max-height: 300px;
                overflow-y: auto;
            }

            @media (max-width: 480px) {
                .hero-title {
                    font-size: 28px;
                }
                .question-text {
                    font-size: 19px;
                }
                .practice-body {
                    padding: 16px 14px;
                }
                .question-card {
                    padding: 24px 16px;
                }
            }
        </style>
    </head>
    <body>
        <!-- HOMEPAGE -->
        <div class="page active" id="homePage">
            <div class="hero-icon">🗾</div>
            <h1 class="hero-title">Belajar Bahasa Jepang</h1>
            <p class="hero-sub">
                Latihan terjemahan dengan AI. Ketik jawaban dalam huruf Jepang
                atau romaji.
            </p>
            <div class="home-buttons">
                <button class="btn btn-primary" id="btnStart">
                    🎯 Mulai Latihan
                </button>
                <button class="btn btn-secondary" id="btnVocab">
                    📖 Vocabulary <span class="badge" id="vocabBadge">0</span>
                </button>
                <button class="btn btn-mensetsu" id="btnMensetsu">
                    🎤 Mensetsu Renshuu
                </button>
                <div class="mensetsu-sub" id="mensetsuSub">
                    <button class="mensetsu-sub-btn" id="btnJikoshokai">
                        🗣️ Mukti Jikoshokai
                    </button>
                    <button class="mensetsu-sub-btn" id="btnNande">
                        ❓ Nande Nihon e Ikitai
                    </button>
                </div>
            </div>
            <div class="hero-footer">Powered by DeepSeek AI</div>
        </div>
        <!-- PRACTICE PAGE -->
        <div class="page" id="practicePage">
            <div class="page-header">
                <button class="btn-back" id="btnBackFromPractice">←</button>
                <h2>Latihan</h2>
            </div>
            <div class="practice-body" id="practiceBody">
                <div class="loading-box" id="practiceLoading">
                    <div class="spinner"></div>
                    <span>Menyiapkan soal...</span>
                </div>
                <div
                    class="question-card"
                    id="questionCard"
                    style="display: none"
                >
                    <div class="question-label">
                        Terjemahkan ke Bahasa Jepang
                    </div>
                    <div class="question-text" id="questionText"></div>
                </div>
                <div class="answer-area" id="answerArea" style="display: none">
                    <input
                        type="text"
                        id="answerInput"
                        placeholder="Ketik jawaban (huruf Jepang / romaji)..."
                        autocomplete="off"
                    />
                    <button class="btn-send" id="sendBtn">Kirim Jawaban</button>
                </div>
                <div id="feedbackArea"></div>
            </div>
        </div>
        <!-- VOCABULARY PAGE -->
        <div class="page" id="vocabPage">
            <div class="page-header">
                <button class="btn-back" id="btnBackFromVocab">←</button>
                <h2>📖 Vocabulary</h2>
            </div>
            <div class="vocab-body" id="vocabBody"></div>
        </div>
        <!-- MENSETSU PAGE -->
        <div class="page" id="mensetsuPage">
            <div class="page-header">
                <button class="btn-back" id="btnBackFromMensetsu">←</button>
                <h2>🎤 Mensetsu Renshuu</h2>

                        .toLowerCase()
                        .replace(/[,.()?!:;'"\[\]]/g, "")
                        .replace(/[\u0101]/g, "a")
                        .replace(/[\u012b]/g, "i")
                        .replace(/[\u016b]/g, "u")
                        .replace(/[\u0113]/g, "e")
                        .replace(/[\u014d]/g, "o")
                        .replace(/aa/g, "a")
                        .replace(/ii/g, "i")
                        .replace(/uu/g, "u")
                        .replace(/ee/g, "e")
                        .replace(/ou/g, "o")
                        .replace(/oo/g, "o")
                        .trim();
                }
                function sendMensetsuAnswer() {
                    if (MSB) return;
                    var i = $("mensetsuInput");
                    if (!i) return;
                    var a = i.value.trim();
                    if (!a) {
                        alert("Silakan ketik jawaban romaji kamu.");
                        return;
                    }
                    var d = MCUR[MSI];
                    if (!d) {
                        exitMensetsu();
                        return;
                    }
                    MSB = true;
                    i.disabled = true;
                    $("mensetsuSendBtn").disabled = true;
                    $("mensetsuActions").style.display = "none";
                    $("mensetsuResult").style.display = "block";
                    // === WORD MATCHING (SISTEM) ===
                    var refLines = d.text.split("\n").filter(function (l) {
                        return l.trim() !== "";
                    });
                    var ansWords = a
                        .toLowerCase()
                        .split(/\s+/)
                        .map(nw)
                        .filter(function (w) {
                            return w !== "";
                        });
                    var totalRef = 0,
                        totalMatch = 0;
                    var lineResults = [];
                    for (var ri = 0; ri < refLines.length; ri++) {
                        var line = refLines[ri].trim();
                        var words = line
                            .split(/\s+/)
                            .map(nw)
                            .filter(function (w) {
                                return w !== "";
                            });
                        var matched = 0;
                        var missingOrig = [];
                        for (var wj = 0; wj < words.length; wj++) {
                            if (ansWords.indexOf(words[wj]) !== -1) {
                                matched++;
                            } else {
                                missingOrig.push(
                                    line.split(/\s+/).filter(function (x) {
                                        return x.trim() !== "";
                                    })[wj],
                                );
                            }
                        }
                        var sim =
                            words.length > 0
                                ? Math.round((matched / words.length) * 100)
                                : 100;
                        lineResults.push({
                            text: line,
                            sim: sim,
                            missingOrig: missingOrig,
                        });
                        totalRef += words.length;
                        totalMatch += matched;
                    }
                    var overallSim =
                        totalRef > 0
                            ? Math.round((totalMatch / totalRef) * 100)
                            : 100;
                    var h =
                        '<div class="syst-result-header">\ud83d\udd0d Penilaian Sistem (kata per kata)</div>' +
                        '<div class="similarity">' +
                        overallSim +
                        '%</div><div class="similarity-label">Kemiripan dengan teks asli</div>';
                    h += '<div class="mensetsu-line-results">';
                    for (var ri = 0; ri < lineResults.length; ri++) {
                        var lr = lineResults[ri];
                        var icon = lr.sim === 100 ? "\u2705" : "\u274c";
                        var cls =
                            lr.sim === 100
                                ? "mensetsu-line-item ok"
                                : "mensetsu-line-item ng";
                        h +=
                            '<div class="' +
                            cls +
                            '"><div class="line-header"><span class="line-icon">' +
                            icon +
                            '</span><span class="line-sim">' +
                            lr.sim +
                            '%</span><span class="line-label">Kalimat ' +
                            (ri + 1) +
                            "</span></div>";
                        if (lr.sim < 100) {
                            h +=
                                '<div class="line-missing">\ud83d\udcc5 Kurang: <strong>' +
                                esc(lr.missingOrig.join(", ")) +
                                "</strong></div>";
                            h +=
                                '<div class="line-ref">\ud83d\udcdd Seharusnya: <em>' +
                                esc(lr.text) +
                                "</em></div>";
                        }
                        h += "</div>";
                    }
                    h += "</div>";
                    // === AI EVALUATION PLACEHOLDER ===
                    h +=
                        '<div class="ai-corrections" id="aiSection"><div class="ai-checking">\ud83e\udd14 Mengevaluasi dengan AI...</div></div>';
                    $("mensetsuResult").innerHTML = h;
                    $("mensetsuResult").style.display = "block";
                    // === AI CALL ===
                    var sys =
                        "Anda adalah GURU BAHASA JEPANG. Evaluasi JAWABAN USER dibanding TEKS REFERENSI per baris.\n\n" +
                        "PANDUAN:\n" +
                        "- Baris BENAR jika kata-kata sama, meski ada variasi romaji (kyoumi=kyoomi=ky\u014dmi, jouzu=j\u014dzu, dll).\n" +
                        "- Baris SALAH jika ada kata yang hilang atau berbeda.\n" +
                        "- Jangan salahkan perbedaan tanda baca atau urutan kata yang wajar.\n" +
                        "- Jika ada typo (misal: detabesu -> d\u0113tab\u0113su), sebutkan koreksinya.\n" +
                        "\nFORMAT RESPON (WAJIB):\n" +
                        "---RESULT---\n" +
                        "Baris 1: <BENAR/SALAH> | <nilai 0-100> | <kata yg kurang. jika lengkap tulis: lengkap> | <koreksi typo atau ->\n" +
                        "Baris 2: ...\n" +
                        "---OVERALL---\n" +
                        "<total_score>\n" +
                        "<feedback singkat>\n";
                    var usr = d.text + "\n\n---JAWABAN USER---\n" + a;
                    cd(sys, usr)
                        .then(function (r) {
                            console.log("AI Response:", r);
                            var t = r.trim();
                            var lines = t.split("\n");
                            var aiLines = [];
                            var overall = "";
                            var inResult = false,
                                inOverall = false;
                            for (var li = 0; li < lines.length; li++) {
                                var l = lines[li].trim();
                                if (l.indexOf("---RESULT---") !== -1) {
                                    inResult = true;
                                    inOverall = false;
                                    continue;
                                }
                                if (l.indexOf("---OVERALL---") !== -1) {
                                    inResult = false;
                                    inOverall = true;
                                    continue;
                                }
                                if (inResult) aiLines.push(l);
                                if (inOverall) overall = l;
                            }
                            var aiH =
                                '<div class="syst-result-header" style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">\ud83e\udd16 Penilaian AI</div>' +
                                '<div class="similarity">' +
                                (overall || "?") +
                                '%</div><div class="similarity-label">Kemiripan berdasarkan AI</div>';
                            aiH += '<div class="mensetsu-line-results">';
                            for (var li = 0; li < aiLines.length; li++) {
                                var parts = aiLines[li].split("|");
                                if (parts.length < 2) continue;
                                var status = parts[0].trim();
                                var score = parts[1] ? parts[1].trim() : "?";
                                var missing = parts[2] ? parts[2].trim() : "";
                                var typo = parts[3] ? parts[3].trim() : "";
                                var isOk = status.indexOf("BENAR") !== -1;
                                var icon = isOk ? "\u2705" : "\u274c";
                                var cls = isOk
                                    ? "mensetsu-line-item ok"
                                    : "mensetsu-line-item ng";
                                aiH +=
                                    '<div class="' +
                                    cls +
                                    '"><div class="line-header"><span class="line-icon">' +
                                    icon +
                                    '</span><span class="line-sim">' +
                                    score +
                                    '%</span><span class="line-label">Kalimat ' +
                                    (li + 1) +
                                    "</span></div>";
                                if (!isOk && missing && missing !== "lengkap") {
                                    aiH +=
                                        '<div class="line-missing">\ud83d\udcc5 Kurang: <strong>' +
                                        esc(missing) +
                                        "</strong></div>";
                                }
                                if (
                                    typo &&
                                    typo !== "-" &&
                                    typo.indexOf("->") !== -1
                                ) {
                                    var tp = typo.split("->");
                                    if (tp.length >= 2) {
                                        aiH +=
                                            '<div class="line-ref">\u270f\ufe0f Typo: <span class="ai-wrong">' +
                                            esc(tp[0].trim()) +
                                            '</span> \u2192 <span class="ai-right">' +
                                            esc(tp[1].trim()) +
                                            "</span></div>";
                                    }
                                }
                                aiH += "</div>";
                            }
                            aiH += "</div>";
                            var aiEl = document.getElementById("aiSection");
                            if (aiEl) aiEl.outerHTML = aiH;
                            var nxt = $("mensetsuNext");
                            if (MSI < MCUR.length - 1) {
                                nxt.textContent =
                                    "\u27a1\ufe0f Lanjut ke " +
                                    MCUR[MSI + 1].label;
                                nxt.style.display = "";
                            } else {
                                nxt.textContent = "\u2705 Selesai";
                                nxt.style.display = "";
                            }
                            $("mensetsuActions").style.display = "flex";
                            MSB = false;
                            i.disabled = false;
                            $("mensetsuSendBtn").disabled = false;
                        })
                        .catch(function (e) {
                            var aiEl = document.getElementById("aiSection");
                            if (aiEl)
                                aiEl.innerHTML =
                                    '<div class="ai-checking done" style="color:var(--danger)">\u26a0\ufe0f Gagal mengevaluasi AI</div>';
                            MSB = false;
                            i.disabled = false;
                            $("mensetsuSendBtn").disabled = false;
                            var nxt = $("mensetsuNext");
                            if (MSI < MCUR.length - 1) {
                                nxt.textContent =
                                    "\u27a1\ufe0f Lanjut ke " +
                                    MCUR[MSI + 1].label;
                                nxt.style.display = "";
                            } else {
                                nxt.textContent = "\u2705 Selesai";
                                nxt.style.display = "";
                            }
                            $("mensetsuActions").style.display = "flex";
                        });
                }
                function retryMensetsu() {
                    loadMensetsuStep(MSI);
                }
                function nextMensetsu() {
                    MSI++;
                    if (MSI >= MCUR.length) {
                        exitMensetsu();
                        return;
                    }
                    loadMensetsuStep(MSI);
                }
                function toggleOriginalText() {
                    var d = MCUR[MSI];
                    if (!d) return;
                    var el = $("mensetsuOriginalText");
                    if (!el) {
                        el = document.createElement("div");
                        el.id = "mensetsuOriginalText";
                        el.className = "mensetsu-original-text";
                        var body = $("mensetsuBody");
                        var inputArea = $("mensetsuInputArea");
                        body.insertBefore(el, inputArea);
                    }
                    if (el.style.display === "block") {
                        el.style.display = "none";
                    } else {
                        el.textContent = d.text;
                        el.style.display = "block";
                    }
                }
                function exitMensetsu() {
                    MSI = 0;
                    MSB = false;
                    var el = $("mensetsuOriginalText");
                    if (el) el.style.display = "none";
                    sh("homePage");
                }
                function init() {
                    var bs = $("btnStart");
                    if (bs) bs.addEventListener("click", st);
                    var bv = $("btnVocab");
                    if (bv) bv.addEventListener("click", sv);
                    var bp = $("btnBackFromPractice");
                    if (bp) bp.addEventListener("click", go);
                    var bv2 = $("btnBackFromVocab");
                    if (bv2) bv2.addEventListener("click", go);
                    var sb = $("sendBtn");
                    if (sb) sb.addEventListener("click", sa);
                    var ai = $("answerInput");
                    if (ai) {
                        ai.addEventListener("keydown", function (e) {
                            if (e.key === "Enter" && !e.shiftKey) {
                                e.preventDefault();
                                sa();
                            }
                        });
                    }
                    var bm = $("btnMensetsu");
                    if (bm) bm.addEventListener("click", toggleMensetsu);
                    var bj = $("btnJikoshokai");
                    if (bj) bj.addEventListener("click", startMensetsu);
                    var bn = $("btnNande");
                    if (bn) bn.addEventListener("click", startNande);
                    var bot = $("btnOriginalText");
                    if (bot) bot.addEventListener("click", toggleOriginalText);
                    var bbm = $("btnBackFromMensetsu");
                    if (bbm) bbm.addEventListener("click", exitMensetsu);
                    var msb = $("mensetsuSendBtn");
                    if (msb) msb.addEventListener("click", sendMensetsuAnswer);
                    var mr = $("mensetsuRetry");
                    if (mr) mr.addEventListener("click", retryMensetsu);
                    var mn = $("mensetsuNext");
                    if (mn) mn.addEventListener("click", nextMensetsu);
                    var mi = $("mensetsuInput");
                    if (mi) {
                        mi.addEventListener("keydown", function (e) {
                            if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
                                e.preventDefault();
                                sendMensetsuAnswer();
                            }
                        });
                    }
                    ub();
                }
                if (document.readyState === "loading") {
                    document.addEventListener("DOMContentLoaded", init);
                } else {
                    init();
                }
            })();
        </script>
    </body>
</html>
